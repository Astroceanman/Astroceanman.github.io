<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>signal://lost</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.void-wrap {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 0 1.5rem;
  font-family: "JetBrains Mono", ui-monospace, monospace;
}

.void-wrap::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent 0 2px, rgba(2, 4, 10, 0.24) 2px 4px);
  opacity: 0.55;
}

.void-label {
  font-size: 0.68rem;
  letter-spacing: 0.34em;
  color: rgba(255, 95, 210, 0.7);
  margin-bottom: 1.6rem;
}

.glitch {
  position: relative;
  font-weight: 600;
  font-size: clamp(2rem, 7.5vw, 3.6rem);
  letter-spacing: 0.24em;
  color: #eef5ff;
  text-shadow: 0 0 26px rgba(143, 208, 255, 0.4);
  animation: shudder 2.4s infinite;
}

.glitch::before, .glitch::after {
  content: attr(data-text);
  position: absolute;
  inset: 0;
  opacity: 0;
}

.glitch::before { color: #62e8ff; animation: glitch-a 2.4s infinite; }
.glitch::after { color: #ff5fd2; animation: glitch-b 2.4s infinite; }

@keyframes shudder {
  0%, 88%, 100% { transform: none; }
  90% { transform: translate(1px, -1px); }
  92% { transform: translate(-1px, 1px); }
  94% { transform: none; }
}

@keyframes glitch-a {
  0%, 78%, 100% { opacity: 0; transform: none; clip-path: inset(0 0 0 0); }
  80% { opacity: 0.9; transform: translate(-4px, 1px); clip-path: inset(8% 0 62% 0); }
  84% { opacity: 0.9; transform: translate(4px, -1px); clip-path: inset(58% 0 12% 0); }
  88% { opacity: 0; }
}

@keyframes glitch-b {
  0%, 79%, 100% { opacity: 0; transform: none; clip-path: inset(0 0 0 0); }
  81% { opacity: 0.9; transform: translate(4px, -2px); clip-path: inset(36% 0 38% 0); }
  85% { opacity: 0.9; transform: translate(-4px, 2px); clip-path: inset(2% 0 82% 0); }
  89% { opacity: 0; }
}

.void-line {
  margin-top: 1.4rem;
  font-size: 0.78rem;
  letter-spacing: 0.08em;
  color: rgba(210, 224, 245, 0.6);
}

.home {
  margin-top: 2.4rem;
  display: inline-block;
  font-family: inherit;
  font-size: 0.8rem;
  letter-spacing: 0.26em;
  padding: 0.95rem 2.2rem;
  color: var(--accent);
  background: rgba(5, 9, 20, 0.55);
  border: 1px solid rgba(143, 208, 255, 0.5);
  text-decoration: none;
  backdrop-filter: blur(8px);
  transition: all 0.3s;
}

.home:hover {
  background: var(--accent);
  color: #04121f;
  box-shadow: 0 0 34px rgba(143, 208, 255, 0.5);
}
</style>
</head>
<body>
<canvas id="sky"></canvas>

<main class="void-wrap">
  <p class="void-label">// WARP THRESHOLD EXCEEDED</p>
  <h1 class="glitch" data-text="SIGNAL LOST">SIGNAL LOST</h1>
  <a class="home" href="index.html">[ RETURN HOME ]</a>
  <p class="void-line">you drifted beyond the charted grid. position unresolved.</p>
</main>

<script src="gaia_stars.js"></script>
<script src="stars.js"></script>
</body>
</html>
